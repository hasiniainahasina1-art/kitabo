name: Lancer le bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
        type: string
      password:
        description: 'Mot de passe'
        required: true
        type: string
      score:
        description: 'Score désiré'
        required: false
        default: '50'
        type: string
      mise:
        description: 'Mise'
        required: false
        default: '200'
        type: string
      joueurs:
        description: 'Nombre de joueurs'
        required: false
        default: '2'
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Installer dépendances
        run: npm install
      
      - name: Installer Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Lancer le bot avec dashboard live
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
        run: |
          pkill Xvfb 2>/dev/null || true
          rm -f /tmp/.X99-lock 2>/dev/null || true
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          export DISPLAY=:99
          
          # Lancer le bot en arrière-plan
          node goodloka-bot.js &
          BOT_PID=$!
          
          # Config git
          git config user.email "kitabo@bot.com"
          git config user.name "Kitabo Bot"
          
          # Boucle de mise à jour du dashboard toutes les 15 secondes
          while kill -0 $BOT_PID 2>/dev/null; do
            sleep 15
            cp dashboard/game_state.json game_state.json 2>/dev/null || true
            git add game_state.json 2>/dev/null || true
            git commit -m "📊 dashboard update" 2>/dev/null || true
            git push origin main:gh-pages --force 2>/dev/null || true
            echo "📊 Dashboard mis à jour"
          done
          
          wait $BOT_PID
      
      - name: Déploiement final sur GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
