name: Lancer le bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Numéro de téléphone'
        required: true
        type: string
      password:
        description: 'Mot de passe'
        required: true
        type: string
      score:
        description: 'Score désiré'
        required: false
        default: '50'
        type: string
      mise:
        description: 'Mise'
        required: false
        default: '200'
        type: string
      joueurs:
        description: 'Nombre de joueurs'
        required: false
        default: '2'
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Installer dépendances
        run: npm install
      
      - name: Installer Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Lancer Xvfb et le bot
        env:
          PHONE: ${{ github.event.inputs.phone }}
          PASSWORD: ${{ github.event.inputs.password }}
          SCORE: ${{ github.event.inputs.score }}
          MISE: ${{ github.event.inputs.mise }}
          JOUEURS: ${{ github.event.inputs.joueurs }}
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          node goodloka-bot.js
      
      - name: Déployer sur GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true